# ============================================================
# .gitlab-ci.yml — Pipeline CI/CD Projet DPIA
# ============================================================

stages:
  - lint
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

# ---------- Cache pip entre les jobs ----------
cache:
  key: pip-${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/

# ==================== LINT ====================
lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR flake8
  script:
    - flake8 src/ --max-line-length=120 --exclude=__pycache__
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ==================== BUILD ====================
build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ==================== TEST ====================
test:unit:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR
        -r requirements.txt -r requirements-dashboard.txt
    - pip install --cache-dir $PIP_CACHE_DIR pytest pytest-cov
  script:
    - pytest tests/test_unit_*.py tests/test_smoke.py
        -v --tb=short
        --cov=src --cov-report=term-missing
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: false

test:integration:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR
        -r requirements.txt -r requirements-dashboard.txt
    - pip install --cache-dir $PIP_CACHE_DIR pytest pytest-cov
  script:
    - pytest tests/test_integration.py
        -v --tb=short
        --cov=src --cov-report=term-missing
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: false

# ==================== DEPLOY (via GitLab Runner shell sur EC2) ====================
deploy:staging:
  stage: deploy
  tags:
    - ec2-shell
  script:
    - cd infra
    - cp $CI_PROJECT_DIR/.env . 2>/dev/null || true
    - docker compose pull
    - docker compose up -d --force-recreate
    - echo "Staging deploy OK"
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

deploy:production:
  stage: deploy
  tags:
    - ec2-shell
  script:
    - mkdir -p data/clean && chmod -R 777 data/
    - env | grep -E '^(ENV_MODE|AWS_|S3_|RDS_|CLOUDWATCH_|MINIO_|ADZUNA_|KAFKA_|CONSUMER_|API_|ETL_)' > .env || true
    - cd infra
    - docker compose pull
    - docker compose up -d --force-recreate
    - echo "Waiting for PostgreSQL..."
    - timeout 60 bash -c 'until docker exec dpia-postgres pg_isready -U airflow; do sleep 3; done'
    - docker exec dpia-postgres psql -U airflow -c "CREATE DATABASE dpia_db;" 2>/dev/null || true
    - echo "Waiting for Airflow webserver..."
    - timeout 300 bash -c 'until curl -sf http://localhost:8080/health; do sleep 10; done' || echo "Airflow still starting..."
    - echo "Triggering initial DAG run..."
    - echo "Waiting for scheduler to parse DAGs..."
    - sleep 60
    - docker exec dpia-airflow-scheduler airflow dags unpause dpia_pipeline || true
    - docker exec dpia-airflow-scheduler airflow dags trigger dpia_pipeline || true
    - sleep 10
    - docker restart dpia-dashboard
    - echo "Production deploy OK — pipeline orchestré par Airflow"
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
