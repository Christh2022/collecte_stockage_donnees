# ============================================================
# .gitlab-ci.yml — Pipeline CI/CD Projet DPIA
# ============================================================

stages:
  - lint
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

# ---------- Cache pip entre les jobs ----------
cache:
  key: pip-${CI_COMMIT_REF_SLUG}
  paths:
    - .pip-cache/

# ==================== LINT ====================
lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR flake8
  script:
    - flake8 src/ --max-line-length=120 --exclude=__pycache__
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ==================== BUILD ====================
build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# ==================== TEST ====================
test:unit:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --cache-dir $PIP_CACHE_DIR -r requirements.txt
    - pip install --cache-dir $PIP_CACHE_DIR pytest
  script:
    - pytest tests/ -v --tb=short
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
  allow_failure: false

# ==================== DEPLOY ====================
deploy:staging:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Déploiement staging — à configurer selon l'infra cible"
    # - docker pull $DOCKER_IMAGE
    # - docker compose -f infra/docker-compose.yml up -d
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  when: manual

deploy:production:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Déploiement production — à configurer selon l'infra cible"
    # - docker pull $DOCKER_IMAGE
    # - docker compose -f infra/docker-compose.yml up -d
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual
