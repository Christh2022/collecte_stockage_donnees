# ============================================================
# Grafana — Provisioning automatique des dashboards
# ============================================================

apiVersion: 1

providers:
  - name: "DPIA Dashboards"
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
