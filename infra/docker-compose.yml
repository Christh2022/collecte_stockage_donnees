# ============================================================
# docker-compose.yml — Projet DPIA
# Infrastructure complète : Pipeline, Airflow, Kafka, Grafana
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  env_file:
    - ../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
  volumes:
    - ../src/dags:/opt/airflow/dags
    - ../src:/opt/airflow/src
    - ../data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - dpia-net

services:
  # ========== PIPELINE PRINCIPAL ==========
  pipeline:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dpia-pipeline
    env_file:
      - ../.env
    volumes:
      - ../src:/app/src
      - ../data:/app/data
    working_dir: /app
    command: ["python", "-m", "src.main"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    networks:
      - dpia-net

  # ========== POSTGRESQL (Airflow metadata + RDS local) ==========
  postgres:
    image: postgres:16-alpine
    container_name: dpia-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dpia-net

  # ========== AIRFLOW — Initialisation DB ==========
  airflow-init:
    <<: *airflow-common
    container_name: dpia-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname DPIA \
          --role Admin \
          --email admin@dpia.local
    restart: "no"

  # ========== AIRFLOW — Webserver ==========
  airflow-webserver:
    <<: *airflow-common
    container_name: dpia-airflow-webserver
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ========== AIRFLOW — Scheduler ==========
  airflow-scheduler:
    <<: *airflow-common
    container_name: dpia-airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ========== ZOOKEEPER (requis par Kafka) ==========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: dpia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    restart: unless-stopped
    networks:
      - dpia-net

  # ========== KAFKA ==========
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: dpia-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    networks:
      - dpia-net

  # ========== GRAFANA (Monitoring & Dashboards) ==========
  grafana:
    image: grafana/grafana:11.2.0
    container_name: dpia-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dpia-net

# ========== VOLUMES PERSISTANTS ==========
volumes:
  postgres-data:
  airflow-logs:
  zookeeper-data:
  kafka-data:
  grafana-data:

# ========== RÉSEAU ==========
networks:
  dpia-net:
    driver: bridge
