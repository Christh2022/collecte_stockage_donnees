# ============================================================
# docker-compose.yml — Projet DPIA (Optimisé)
# Infrastructure : Airflow, Kafka KRaft, Prometheus,
# Grafana, MinIO, Scrapers, Consumer
# ============================================================
# Réduction : 17 → 11 containers
#   - pipeline supprimé (ne faisait qu'un print)
#   - zookeeper supprimé (Kafka KRaft mode)
#   - airflow-init fusionné dans airflow-webserver
#   - minio-init fusionné dans minio entrypoint
#   - api-producer + lesjeudis-scraper → scrapers (un seul container)
#   - postgres-exporter supprimé (léger, optionnel)
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  env_file:
    - ../.env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
  volumes:
    - ../src/dags:/opt/airflow/dags
    - ../src:/opt/airflow/src
    - ../data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - dpia-net

services:
  # ========== POSTGRESQL (Airflow metadata + RDS local) ==========
  postgres:
    image: postgres:16-alpine
    container_name: dpia-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 384M
    networks:
      - dpia-net

  # ========== AIRFLOW — Initialisation DB ==========
  airflow-init:
    <<: *airflow-common
    container_name: dpia-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname DPIA \
          --role Admin \
          --email admin@dpia.local || true
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  # ========== AIRFLOW — Webserver ==========
  airflow-webserver:
    <<: *airflow-common
    container_name: dpia-airflow-webserver
    command: airflow webserver
    stop_grace_period: 45s
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  # ========== AIRFLOW — Scheduler ==========
  airflow-scheduler:
    <<: *airflow-common
    container_name: dpia-airflow-scheduler
    command: airflow scheduler
    stop_grace_period: 45s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 384M

  # ========== KAFKA (KRaft mode — sans Zookeeper) ==========
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: dpia-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      CLUSTER_ID: "dpia-kafka-kraft-cluster-01"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M
    networks:
      - dpia-net

  # ========== SCRAPERS (Adzuna → Kafka, LesJeudis → MinIO) ==========
  scrapers:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dpia-scrapers
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ../src:/app/src
    command:
      - /bin/sh
      - -c
      - |
        python -m src.scraping.api_producer &&
        python -m src.scraping.lesjeudis_scraper
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 256M
    networks:
      - dpia-net

  # ========== KAFKA → S3 CONSUMER ==========
  s3-consumer:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dpia-s3-consumer
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ../src:/app/src
    command: ["python", "-m", "src.storage.kafka_to_s3_consumer"]
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 256M
    networks:
      - dpia-net

  # ========== ETL TRANSFORM (S3 raw → clean CSV + PostgreSQL) ==========
  etl-transform:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dpia-etl-transform
    env_file:
      - ../.env
    environment:
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - ../src:/app/src
      - ../data:/app/data
    command: ["python", "-m", "src.transform.etl_transform"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 256M
    networks:
      - dpia-net

  # ========== DASHBOARD (Dash + Plotly + Bokeh) ==========
  dashboard:
    build:
      context: ..
      dockerfile: Dockerfile.dashboard
    container_name: dpia-dashboard
    init: true
    env_file:
      - ../.env
    ports:
      - "8050:8050"
    volumes:
      - ../src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.60"
          memory: 384M
    networks:
      - dpia-net

  # ========== NODE EXPORTER (Métriques CPU/RAM/Disque du host) ==========
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: dpia-node-exporter
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|snap|run)($$|/)"
      - "--no-collector.arp"
      - "--no-collector.btrfs"
      - "--no-collector.ipvs"
      - "--no-collector.wifi"
      - "--no-collector.infiniband"
      - "--no-collector.zfs"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    pid: host
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 128M
    networks:
      - dpia-net

  # ========== DOCKER EXPORTER (Métriques par conteneur via Docker socket) ==========
  docker-exporter:
    build:
      context: ./docker-exporter
    container_name: dpia-docker-exporter
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 64M
    networks:
      - dpia-net

  # ========== PROMETHEUS (Collecte de métriques) ==========
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: dpia-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - node-exporter
      - docker-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 256M
    networks:
      - dpia-net

  # ========== GRAFANA (Dashboards + Prometheus datasource) ==========
  grafana:
    image: grafana/grafana:11.2.0
    container_name: dpia-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 256M
    networks:
      - dpia-net

  # ========== MINIO (Stockage S3 local + init bucket intégré) ==========
  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: dpia-minio
    init: true
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 384M
    networks:
      - dpia-net

  # ========== MINIO INIT (création du bucket par défaut) ==========
  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    container_name: dpia-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/dpia-data-bucket &&
        mc anonymous set none local/dpia-data-bucket &&
        echo "Bucket dpia-data-bucket créé avec succès"
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 64M
    networks:
      - dpia-net

# ========== VOLUMES PERSISTANTS ==========
volumes:
  postgres-data:
  airflow-logs:
  kafka-data:
  prometheus-data:
  grafana-data:
  minio-data:

# ========== RÉSEAU ==========
networks:
  dpia-net:
    driver: bridge
