# ============================================================
# prometheus.yml — Configuration Prometheus pour le projet DPIA
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # --- Prometheus lui-même ---
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # --- PostgreSQL (via postgres_exporter) ---
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # --- Kafka (via JMX exporter intégré) ---
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9101"]

  # --- Airflow (métriques StatsD → Prometheus via statsd-exporter si activé) ---
  # - job_name: "airflow"
  #   static_configs:
  #     - targets: ["statsd-exporter:9102"]
