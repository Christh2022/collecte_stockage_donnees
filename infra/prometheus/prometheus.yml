# ============================================================
# prometheus.yml — Configuration Prometheus pour le projet DPIA
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # --- Prometheus lui-même ---
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # --- Node Exporter (CPU, RAM, Disque du VPS) ---
  - job_name: "node-exporter"
    scrape_interval: 60s
    scrape_timeout: 30s
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "vps-host"

  # --- Docker Exporter (Métriques par conteneur Docker) ---
  - job_name: "docker"
    scrape_interval: 60s
    scrape_timeout: 30s
    static_configs:
      - targets: ["docker-exporter:9417"]

  # --- Kafka (via JMX exporter intégré) ---
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9101"]
